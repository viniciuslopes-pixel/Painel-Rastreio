# Tema claro por padrão (ignora preferência do sistema / modo escuro do navegador).
[theme]
base = "light"

# Em produção (Streamlit Community Cloud) a plataforma define host/porta.
# Localmente: use http://localhost:8501 ou, se precisar, `streamlit run ... --server.address 127.0.0.1`.
[server]
headless = true

[browser]
gatherUsageStats = false
